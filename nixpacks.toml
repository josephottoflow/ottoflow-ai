# Railway / nixpacks build config for the worker service.
#
# Default nixpacks for Next.js: `npm ci` → `npm run build` → `npm run start`.
# That assumes a web app. We're building a BullMQ worker, so override every
# phase to drive `worker/build.mjs` (esbuild bundle) and `node worker/dist/index.js`.
#
# Critical: pin Node 22 (Node 20 has no native WebSocket and supabase-js auto-
# initializes a Realtime client at SupabaseClient construction — even when we
# don't use Realtime from the worker. Without native WebSocket the worker
# crashes at startup with "Node.js 20 detected without native WebSocket
# support. install ws package…". Node 22 has WebSocket natively, so we
# don't need to ship the `ws` polyfill. Also fixes the original EBADENGINE
# warnings from transitive deps requiring >=20.)

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
# Worker system dependencies:
#   nodejs_22       — runtime (see above)
#   ffmpeg-full     — child_process.spawn("ffmpeg") for audio mux step
#                     in video-merge.ts (post-Remotion render). Full build
#                     gives us libx264 + aac + amix filter support.
#   fontconfig +    — used by older `fc-match` overlay font lookup (now
#   dejavu_fonts      dead code post-ADR-001 Phase 2 since overlays render
#                     in Remotion/Chrome, but cheap to keep around for the
#                     single-clip fallback path if it ever needs text).
#
# ADR-001 Phase 2 additions for Remotion + Chrome Headless Shell:
#   chromium        — full Chromium binary. Remotion can also auto-download
#                     a Chrome Headless Shell into ~/.cache/remotion (see
#                     `npx remotion browser ensure` in [phases.build]),
#                     but having chromium present means our system has all
#                     the shared libs the headless shell links against.
#   liberation_ttf  — Chromium needs fallback fonts for text rendering of
#                     the <OverlayText> component in remotion/compositions/.
nixPkgs = [
  "nodejs_22",
  "ffmpeg-full",
  "fontconfig",
  "dejavu_fonts",
  # v2 Phase 2 — Chromium + fonts for Remotion render in video-merge worker
  "chromium",
  "liberation_ttf",
]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
# Pre-download Remotion's Chrome Headless Shell INTO the image layer so the
# first worker job after a deploy doesn't pay the ~113MB / ~30s download.
# This matches the root project's Dockerfile.worker pattern. The download
# lands in ~/.cache/remotion and is reused for every render.
#
# `--silent` suppresses the progress bar (clean Railway build logs).
cmds = [
  "npm run build:worker",
  "npx remotion browser ensure --silent",
]

[start]
cmd = "npm run start:worker"
